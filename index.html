<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="container">
    <div>
      <input type="text" id="input-field" readonly>
    </div>
    
    <div id="btn-components">
      <div id="numbers">
        <button id="one" class="btn-style">1</button>
        <button id="two" class="btn-style">2</button>
        <button id="three" class="btn-style">3</button>
        <button id="four" class="btn-style">4</button>
        <button id="five" class="btn-style">5</button>
        <button id="six" class="btn-style">6</button>
        <button id="seven" class="btn-style">7</button>
        <button id="eight" class="btn-style">8</button>
        <button id="nine" class="btn-style">9</button>
        <button id="point" class="btn-style">.</button>
        <button id="zero" class="btn-style">0</button>
        <button class="btn-style">DEL</button>
      </div>

      <div id="operator">
        <button class="btn-style">AC</button>
        <button class="btn-style">=</button>
        <button class="btn-style">+</button>
        <button class="btn-style">-</button>
        <button class="btn-style">x</button>
        <button class="btn-style">/</button>
        <button class="btn-style signature">made by igrixe</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  
</body>
</html>
