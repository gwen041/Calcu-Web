<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="container">
    <div>
      <input type="text" id="input-field" readonly>
    </div>
    
    <div id="btn-components">
      <div id="numbers">
        <button id="seven" onclick="btnSeven()" class="btn-style">7</button>
        <button id="eight" onclick="btnEight()" class="btn-style">8</button>
        <button id="nine" onclick="btnNine()" class="btn-style">9</button>
        <button id="four" onclick="btnFour()" class="btn-style">4</button>
        <button id="five" onclick="btnFive()" class="btn-style">5</button>
        <button id="six" onclick="btnSix()" class="btn-style">6</button>
        <button id="one" onclick="btnOne()" class="btn-style">1</button>
        <button id="two" onclick="btnTwo()" class="btn-style">2</button>
        <button id="three" onclick="btnThree()" class="btn-style">3</button>
        <button id="point" class="btn-style symbol">.</button>
        <button id="zero" onclick="btnZero()" class="btn-style">0</button>
        <button id="del" onclick="btnDel()" class="btn-style">DEL</button>
      </div>

      <div id="operator">
        <button id="clear" onclick="clearAll()" class="btn-style">AC</button>
        <button onclick="compute()" class="btn-style">=</button>
        <button class="btn-style symbol">+</button>
        <button class="btn-style symbol">-</button>
        <button class="btn-style symbol">x</button>
        <button class="btn-style symbol">/</button>
        <button onclick="getLink()" class="btn-style signature">made by igrixe</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  
</body>
</html>
